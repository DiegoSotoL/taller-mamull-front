<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1e1408"/>

  <!-- Wall -->
  <rect x="0" y="0" width="1200" height="480" fill="#241808"/>

  <!-- Wall brackets (left shelf) -->
  <rect x="200" y="168" width="10" height="40" rx="2" fill="#8c7356"/>
  <rect x="200" y="200" width="30" height="8" rx="2" fill="#8c7356"/>
  <rect x="500" y="168" width="10" height="40" rx="2" fill="#8c7356"/>
  <rect x="480" y="200" width="30" height="8" rx="2" fill="#8c7356"/>

  <!-- Shelf 1 (top) -->
  <rect x="180" y="156" width="360" height="22" rx="3" fill="#c08a3a"/>
  <!-- Objects on shelf 1 -->
  <rect x="200" y="120" width="22" height="34" rx="1" fill="#4a3418"/>
  <rect x="224" y="126" width="16" height="28" rx="1" fill="#6e5940"/>
  <rect x="242" y="118" width="24" height="36" rx="1" fill="#3a280f"/>
  <rect x="320" y="110" width="40" height="44" rx="3" fill="#2a1a06" opacity="0.6"/>
  <!-- Plant pot -->
  <ellipse cx="490" cy="154" rx="18" ry="8" fill="#3a5c2a" opacity="0.7"/>
  <rect x="476" y="130" width="28" height="24" rx="4" fill="#4a3418" opacity="0.8"/>

  <!-- Wall brackets (middle shelf) -->
  <rect x="280" y="268" width="10" height="40" rx="2" fill="#8c7356"/>
  <rect x="280" y="300" width="30" height="8" rx="2" fill="#8c7356"/>
  <rect x="680" y="268" width="10" height="40" rx="2" fill="#8c7356"/>
  <rect x="660" y="300" width="30" height="8" rx="2" fill="#8c7356"/>

  <!-- Shelf 2 (middle, wider) -->
  <rect x="260" y="256" width="460" height="22" rx="3" fill="#c08a3a"/>
  <!-- Objects on shelf 2 -->
  <rect x="280" y="210" width="28" height="44" rx="1" fill="#5a3f17"/>
  <rect x="310" y="218" width="20" height="36" rx="1" fill="#4a3418"/>
  <rect x="332" y="212" width="24" height="42" rx="1" fill="#3a280f"/>
  <rect x="358" y="220" width="18" height="34" rx="1" fill="#6e5940"/>
  <!-- Candle/decoration -->
  <rect x="560" y="230" width="10" height="24" rx="2" fill="#fdf8f0" opacity="0.15"/>
  <ellipse cx="565" cy="228" rx="5" ry="3" fill="#c08a3a" opacity="0.5"/>
  <!-- Frame -->
  <rect x="620" y="208" width="50" height="46" rx="2" fill="#2a1a06" opacity="0.7"/>
  <rect x="626" y="214" width="38" height="34" rx="1" fill="#1e1408" opacity="0.8"/>

  <!-- Wall brackets (bottom shelf) -->
  <rect x="380" y="368" width="10" height="40" rx="2" fill="#8c7356"/>
  <rect x="380" y="400" width="30" height="8" rx="2" fill="#8c7356"/>
  <rect x="810" y="368" width="10" height="40" rx="2" fill="#8c7356"/>
  <rect x="790" y="400" width="30" height="8" rx="2" fill="#8c7356"/>

  <!-- Shelf 3 (bottom, widest) -->
  <rect x="360" y="356" width="480" height="22" rx="3" fill="#c08a3a"/>
  <!-- Objects on shelf 3 -->
  <rect x="380" y="304" width="32" height="50" rx="1" fill="#4a3418"/>
  <rect x="414" y="312" width="22" height="42" rx="1" fill="#6e5940"/>
  <rect x="438" y="308" width="28" height="46" rx="1" fill="#3a280f"/>
  <rect x="468" y="316" width="18" height="38" rx="1" fill="#5a3f17"/>
  <!-- Box decoration -->
  <rect x="650" y="316" width="60" height="38" rx="3" fill="#2a1a06" opacity="0.6"/>
  <rect x="658" y="322" width="44" height="26" rx="2" fill="#1e1408" opacity="0.6"/>
  <!-- Another plant -->
  <ellipse cx="800" cy="354" rx="22" ry="10" fill="#3a5c2a" opacity="0.7"/>
  <rect x="782" y="322" width="36" height="32" rx="4" fill="#4a3418" opacity="0.8"/>

  <!-- Floor line -->
  <rect x="0" y="480" width="1200" height="150" fill="#1a1005"/>
  <rect x="0" y="478" width="1200" height="4" fill="#2a1a06"/>

  <!-- Label -->
  <text x="600" y="565" font-family="Georgia, serif" font-size="28" fill="#c08a3a" text-anchor="middle" letter-spacing="2">Repisas Flotantes de Madera</text>
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="16" fill="#8c7356" text-anchor="middle" letter-spacing="1">Taller Mamüll · Valparaíso</text>

  <!-- Watermark -->
  <text x="40" y="620" font-family="Georgia, serif" font-size="18" fill="#c08a3a" opacity="0.5">tallermamull.cl</text>
</svg>
