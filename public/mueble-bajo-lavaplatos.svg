<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1e1408"/>
  <!-- Grain texture overlay -->
  <rect width="1200" height="630" fill="url(#grain)" opacity="0.04"/>
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- Cabinet body -->
  <rect x="260" y="230" width="680" height="260" rx="4" fill="#3a280f"/>
  <!-- Top surface -->
  <rect x="250" y="215" width="700" height="22" rx="3" fill="#c08a3a"/>
  <!-- Bottom plinth -->
  <rect x="290" y="480" width="620" height="18" rx="2" fill="#2a1a06"/>

  <!-- Left door -->
  <rect x="272" y="238" width="310" height="238" rx="3" fill="#4a3418"/>
  <rect x="280" y="246" width="294" height="222" rx="2" fill="#3d2a0f" stroke="#c08a3a" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Left door handle -->
  <rect x="560" y="350" width="8" height="32" rx="4" fill="#c08a3a"/>

  <!-- Right door -->
  <rect x="618" y="238" width="310" height="238" rx="3" fill="#4a3418"/>
  <rect x="626" y="246" width="294" height="222" rx="2" fill="#3d2a0f" stroke="#c08a3a" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Right door handle -->
  <rect x="632" y="350" width="8" height="32" rx="4" fill="#c08a3a"/>

  <!-- Divider between doors -->
  <rect x="598" y="232" width="4" height="248" fill="#2a1a06"/>

  <!-- Sink outline on top -->
  <rect x="440" y="170" width="320" height="52" rx="6" fill="#2a1a06" stroke="#c08a3a" stroke-width="2" stroke-opacity="0.6"/>
  <rect x="455" y="178" width="290" height="36" rx="4" fill="#1e1408"/>
  <!-- Faucet -->
  <rect x="586" y="140" width="8" height="32" rx="4" fill="#8c7356"/>
  <rect x="570" y="136" width="40" height="8" rx="4" fill="#8c7356"/>

  <!-- Label -->
  <text x="600" y="575" font-family="Georgia, serif" font-size="28" fill="#c08a3a" text-anchor="middle" letter-spacing="2">Mueble Bajo Lavaplatos a Medida</text>
  <text x="600" y="607" font-family="Arial, sans-serif" font-size="16" fill="#8c7356" text-anchor="middle" letter-spacing="1">Taller Mamüll · Valparaíso</text>

  <!-- Watermark corner -->
  <text x="40" y="600" font-family="Georgia, serif" font-size="18" fill="#c08a3a" opacity="0.5">tallermamull.cl</text>
</svg>
