<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1e1408"/>

  <!-- Bed frame -->
  <rect x="180" y="320" width="420" height="200" rx="4" fill="#3a280f"/>
  <rect x="180" y="310" width="420" height="24" rx="3" fill="#c08a3a"/>
  <!-- Headboard -->
  <rect x="180" y="220" width="420" height="98" rx="6" fill="#4a3418" stroke="#c08a3a" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Mattress -->
  <rect x="192" y="334" width="396" height="180" rx="4" fill="#fdf8f0" opacity="0.08"/>
  <!-- Pillow -->
  <rect x="220" y="346" width="160" height="80" rx="12" fill="#fdf8f0" opacity="0.12"/>
  <rect x="420" y="346" width="130" height="80" rx="12" fill="#fdf8f0" opacity="0.10"/>
  <!-- Legs -->
  <rect x="190" y="512" width="16" height="24" rx="2" fill="#2a1a06"/>
  <rect x="584" y="512" width="16" height="24" rx="2" fill="#2a1a06"/>

  <!-- Desk unit -->
  <rect x="660" y="380" width="360" height="140" rx="3" fill="#3a280f"/>
  <!-- Desktop surface -->
  <rect x="650" y="370" width="380" height="16" rx="2" fill="#c08a3a"/>
  <!-- Shelf tower above desk -->
  <rect x="870" y="200" width="140" height="178" rx="3" fill="#3a280f"/>
  <rect x="870" y="200" width="140" height="10" rx="2" fill="#c08a3a"/>
  <rect x="870" y="258" width="140" height="6" rx="1" fill="#c08a3a" opacity="0.5"/>
  <rect x="870" y="316" width="140" height="6" rx="1" fill="#c08a3a" opacity="0.5"/>
  <!-- Books on shelves -->
  <rect x="880" y="212" width="18" height="44" rx="1" fill="#c08a3a" opacity="0.4"/>
  <rect x="900" y="218" width="14" height="38" rx="1" fill="#d4a96a" opacity="0.35"/>
  <rect x="916" y="214" width="20" height="42" rx="1" fill="#8c7356" opacity="0.4"/>
  <rect x="880" y="268" width="16" height="46" rx="1" fill="#d4a96a" opacity="0.4"/>
  <rect x="898" y="272" width="12" height="42" rx="1" fill="#c08a3a" opacity="0.35"/>

  <!-- Desk legs -->
  <rect x="666" y="512" width="14" height="24" rx="2" fill="#2a1a06"/>
  <rect x="990" y="512" width="14" height="24" rx="2" fill="#2a1a06"/>

  <!-- Connecting shelf bridge -->
  <rect x="600" y="370" width="60" height="8" rx="2" fill="#c08a3a" opacity="0.4"/>

  <!-- Label -->
  <text x="600" y="575" font-family="Georgia, serif" font-size="28" fill="#c08a3a" text-anchor="middle" letter-spacing="2">Conjunto Dormitorio Infantil</text>
  <text x="600" y="607" font-family="Arial, sans-serif" font-size="16" fill="#8c7356" text-anchor="middle" letter-spacing="1">Taller Mamüll · Valparaíso</text>

  <!-- Watermark corner -->
  <text x="40" y="600" font-family="Georgia, serif" font-size="18" fill="#c08a3a" opacity="0.5">tallermamull.cl</text>
</svg>
